services:
  # 1. Java Backend Service
  - type: web
    name: aqi-calculator-backend
    runtime: docker
    plan: free
    rootDir: java-backend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080

  # 2. Next.js Frontend Service
  - type: web
    name: aqi-calculator-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://aqi-calculator-backend.onrender.com
